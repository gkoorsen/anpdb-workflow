[project]
root = "../../.."

[production]
require_production_ready = true

[run]
name = "sglt2_mol13144_100ns_rep3"
target = "SGLT2"
replicate = 3
seed = 131443
output_dir = "md_runs/production/sglt2_mol13144/rep3"

[input]
compound_id = "Mol_13144"
pdb = "7VSI"
docking_mode = 1
receptor_pdb = "data/md_inputs/receptors/7VSI_opm_oriented_clean.pdb"
receptor_is_membrane_oriented = true
ligand_pdbqt = "data/md_inputs/poses/Mol_13144_7VSI_out.pdbqt"
ligand_smiles_table = "data/md_inputs/anpdb_truly_novel_std.csv"
ligand_id_column = "molecule_id"
ligand_smiles_column = "std_smiles"

[tools]
obabel = "obabel"

[ligand]
pose_mode = "graft"
charge_model = "openff-gnn-am1bcc-0.1.0-rc.3.pt"

[forcefield]
files = ["amber14-all.xml", "amber14/tip3p.xml"]

[system]
environment = "membrane"
ph = 7.4
ionic_strength_molar = 0.15
positive_ion = "Na+"
negative_ion = "Cl-"

[system.membrane]
enabled = true
lipid_type = "POPC"
center_z_nm = 0.0
minimum_padding_nm = 1.0

[system.cofactors]
policy = "strip"
strip_resnames = []
parameter_files = []

[platform]
name = "CUDA"
device_index = "0"
precision = "mixed"

[simulation]
production_ns = 100.0
timestep_fs = 2.0
temperature_K = 310.0
pressure_atm = 1.0
friction_per_ps = 1.0
nonbonded_cutoff_nm = 1.0
hydrogen_mass_amu = 4.0
minimization_max_iterations = 10000

[simulation.equilibration]
nvt_ps = 500.0
npt_ps = 2000.0

[output]
trajectory_interval_ps = 50.0
state_interval_ps = 50.0
checkpoint_interval_ps = 500.0

[analysis]
ligand_resname = "UNL"
